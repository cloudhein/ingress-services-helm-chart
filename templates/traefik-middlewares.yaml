---
# CORS Middleware
{{- if .Values.traefik.cors.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-headers
  namespace: {{ .Values.traefik.namespace }}
spec:
  headers:
    accessControlAllowMethods:
      {{- range .Values.traefik.cors.accessControlAllowMethods }}
      - {{ . | quote }}
      {{- end }}
    accessControlAllowHeaders:
      {{- range .Values.traefik.cors.accessControlAllowHeaders }}
      - {{ . | quote }}
      {{- end }}
    accessControlAllowOriginListRegex:
      {{- range .Values.traefik.cors.accessControlAllowOriginListRegex }}
      - {{ . | quote }}
      {{- end }}
    accessControlMaxAge: {{ .Values.traefik.cors.accessControlMaxAge }}
    addVaryHeader: {{ .Values.traefik.cors.addVaryHeader }}
---
{{- end }}

# Rate Limiting Middleware (Auth)
{{- if .Values.throttler.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: throttler-check
  namespace: {{ .Values.traefik.namespace }}
spec:
  forwardAuth:
    address: "http://{{ .Values.throttler.serviceName }}.{{ .Values.throttler.namespace }}.svc.cluster.local:{{ .Values.throttler.port }}{{ .Values.throttler.path }}"
    trustForwardHeader: {{ .Values.throttler.trustForwardHeader }}
---
{{- end }}

# Strip Prefix Middlewares for each route
{{- range $routeName, $route := .Values.routes }}
{{- if and $route.enabled $route.stripPrefix }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-{{ $routeName }}
  namespace: {{ $.Values.traefik.namespace }}
spec:
  stripPrefix:
    prefixes:
      - {{ $route.prefix }}
{{- end }}
{{- end }}
