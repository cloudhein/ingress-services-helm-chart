# ── ALB Ingress ───────────────────────────────────────────────────────────────
alb:
  enabled: true
  ingressClassName: alb
  namespace: traefik
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /ping
    alb.ingress.kubernetes.io/healthcheck-port: "8000"
    alb.ingress.kubernetes.io/success-codes: "200,404"
    ## ── ALB SSL Integration────────────────────────────────────────
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/certificate-arn: ""  # ← fill after ACM issues cert
    #######################################################################
  service:
    name: traefik
    port: 80

  # ── ADD: optional host for domain routing ────────────
  host: ""   # e.g. api.nandaxsr.xyz — leave empty to match all hosts
  #host: "api.nandaxsr.xyz"

# ── Traefik Configuration ─────────────────────────────────────────────────────
traefik:
  namespace: default
  entryPoint: web
  cors:
    enabled: true
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    accessControlAllowHeaders:
      - "*"
    # ── STAGING (current) ──────────────────────────────
    # Allows all origins, no credentials
    # Use when: testing, no custom domain yet
    accessControlAllowOriginListRegex:
      - ".*"
    accessControlAllowCredentials: false
    # ───────────────────────────────────────────────────

    ## ── PRODUCTION ─────────────────────────────────────
    ## Specific origin + credentials enabled
    ## Use when: api.nandaxsr.xyz + ACM cert ready
    ## Switch BOTH together — they are linked!
    # accessControlAllowOriginList:
    #   - "https://flextrack.nandaxsr.xyz"
    # accessControlAllowCredentials: true
    ## ───────────────────────────────────────────────────

    accessControlMaxAge: 100
    addVaryHeader: true

# ── Rate Limiting Middleware ───────────────────────────────────────────────────
throttler:
  enabled: true
  serviceName: throttler-app
  namespace: default
  port: 8080
  path: /v1/ratelimit
  trustForwardHeader: true

# ── Application Routes ────────────────────────────────────────────────────────
routes:
  expenses:
    enabled: true
    serviceName: expenses-app
    servicePort: 8080
    prefix: /expenses
    stripPrefix: true
    useThrottler: true
    useCors: true

  notifier:
    enabled: true
    serviceName: notifier-app
    servicePort: 8080
    prefix: /notifier
    stripPrefix: true
    useThrottler: true
    useCors: true
