# ── ALB Ingress ───────────────────────────────────────────────────────────────
alb:
  enabled: true
  ingressClassName: alb
  namespace: traefik
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /ping
    alb.ingress.kubernetes.io/healthcheck-port: "8000"
    alb.ingress.kubernetes.io/success-codes: "200,404"
    # ── ALB SSL Integration for production  usecases──────────────────────────────────────
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-southeast-1:997184852039:certificate/8aad743a-d9e0-4c1c-a48a-25fda758ef76"  # ← fill after ACM issues cert
  service:
    name: traefik
    port: 80

  # ── ADD: optional host for domain routing ────────────
  #host: ""   # e.g. api.nandaxsr.xyz — leave empty to match all hosts
  # For production, set the host to your domain (e.g. api.nandaxsr.xyz) to enable domain-based routing and proper CORS handling
  host: "api.nandaxsr.xyz"

# ── Traefik Configuration ─────────────────────────────────────────────────────
traefik:
  namespace: default
  entryPoint: web
  cors:
    enabled: true
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    accessControlAllowHeaders:
      - "*"

    # ── PRODUCTION ─────────────────────────────────────
    # Specific origin + credentials enabled
    # Use when: api.nandaxsr.xyz + ACM cert ready
    # Switch BOTH together — they are linked!
    accessControlAllowOriginList:
    - "https://flextrack.nandaxsr.xyz"
    accessControlAllowCredentials: true
    # ───────────────────────────────────────────────────

    accessControlMaxAge: 100
    addVaryHeader: true

# ── Rate Limiting Middleware ───────────────────────────────────────────────────
throttler:
  enabled: true
  serviceName: throttler-app
  namespace: default
  port: 8080
  path: /v1/ratelimit
  trustForwardHeader: true

# ── Application Routes ────────────────────────────────────────────────────────
routes:
  expenses:
    enabled: true
    serviceName: expenses-app
    servicePort: 8080
    prefix: /expenses
    stripPrefix: true
    useThrottler: true
    useCors: true

  notifier:
    enabled: true
    serviceName: notifier-app
    servicePort: 8080
    prefix: /notifier
    stripPrefix: true
    useThrottler: true
    useCors: true
